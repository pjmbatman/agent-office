<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Office</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-base: #07131a;
        --bg-primary: #0d1b22;
        --bg-secondary: #142630;
        --bg-elevated: #19333f;
        --bg-surface: #1d3c4a;
        --bg-hover: #224754;
        --bg-active: #2b5a68;
        --bg-panel: rgba(10, 22, 28, 0.82);
        --bg-panel-strong: rgba(12, 28, 35, 0.94);
        --bg-glow: radial-gradient(circle at top left, rgba(81, 191, 173, 0.12), transparent 34%), radial-gradient(circle at bottom right, rgba(240, 183, 74, 0.1), transparent 28%), linear-gradient(180deg, #07131a 0%, #0d1b22 100%);

        --border-subtle: rgba(151, 192, 181, 0.08);
        --border-default: rgba(151, 192, 181, 0.16);
        --border-prominent: rgba(216, 233, 227, 0.22);
        --border-focus: rgba(81, 191, 173, 0.55);

        --text-primary: #ecf5f2;
        --text-secondary: #a2bbb4;
        --text-tertiary: #74918b;
        --text-muted: #52706c;

        --role-teamlead: #68d2c0;
        --role-teamlead-bg: rgba(104, 210, 192, 0.1);
        --role-teamlead-border: rgba(104, 210, 192, 0.28);
        --role-senior: #ffb86b;
        --role-senior-bg: rgba(255, 184, 107, 0.1);
        --role-senior-border: rgba(255, 184, 107, 0.28);
        --role-junior: #9cc7ff;
        --role-junior-bg: rgba(156, 199, 255, 0.1);
        --role-junior-border: rgba(156, 199, 255, 0.28);
        --role-ceo: #ff8c7a;
        --role-ceo-bg: rgba(255, 140, 122, 0.1);
        --role-ceo-border: rgba(255, 140, 122, 0.28);
        --role-system: #94a3b8;
        --role-system-bg: rgba(148, 163, 184, 0.06);

        --accent-primary: #51bfad;
        --accent-success: #56d88c;
        --accent-warning: #f0b74a;
        --accent-danger: #ff6b6b;
        --accent-purple: #8ca3ff;
        --accent-brass: #d7a64a;

        /* Spacing */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;

        /* Typography */
        --font-xs: 0.6875rem;
        --font-sm: 0.75rem;
        --font-base: 0.8125rem;
        --font-lg: 0.875rem;
        --font-xl: 1rem;
        --font-2xl: 1.125rem;

        /* Radius */
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-xl: 16px;
        --radius-full: 9999px;

        /* Shadows */
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
        --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
        --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
        --shadow-inset: inset 0 1px 0 rgba(255,255,255,0.03);

        /* Transitions */
        --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }

      body {
        font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: var(--bg-glow);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      h1, h2, h3, h4, button, [data-ui-heading="true"] {
        font-family: 'Space Grotesk', 'Noto Sans KR', sans-serif;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(148, 163, 184, 0.15);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(148, 163, 184, 0.25);
      }

      /* Animations */
      @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(0.85); }
      }
      @keyframes pulse-ring {
        0% { opacity: 0.6; transform: scale(1); }
        100% { opacity: 0; transform: scale(2.2); }
      }
      @keyframes slide-up {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes progress-flow {
        0% { background-position: 0% 0; }
        100% { background-position: 200% 0; }
      }

      .animate-slide-up {
        animation: slide-up 0.25s ease-out;
      }
      .animate-fade-in {
        animation: fade-in 0.2s ease-out;
      }
      .pulse-active {
        animation: pulse-dot 2s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
